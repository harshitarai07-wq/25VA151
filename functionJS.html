</head>
<body>
    <script>
        //function: block of code designed to perform specific task

        //normal function

        // }
        // demo1("React");
        // //function with default parameter
        // function add(a,b){//last variable ko default value assign hogi agr ek ko de rhe hain
        //     var num1=a;
        //     var num2=b;
        //     var res=num1+num2;
        //     console.log("Addition of two numbers is" + res);//by default function ka behavior synchronous hai
        // }
        // add();
        //Code runs line by line, and each task must finish before the next one starts.(synchronous)
        //Tasks can run independently, and JavaScript doesn’t wait for them to finish.(asynchronous)
        // function cal(){
        //     function sub(x,y){
        //         console.log("Subtraction is" + (x-y));
        //     }
        // function mul(p,q){
        //     console.log("Multiplication is" + (p*q));
        // }
        // mul(9,6);
        // sub(5,7);
        // }
        // cal();
        // //anomynous function

        let msg=function(){//variable ko function assign krre hain
                console.log("Hello ABES");
        }
        msg();
        //short code for above function i.e, arrow function
        
        let msg1=()=>console.log("Hello World");
        msg1();
        //arrow function with multiple lines
        let msg2=(age)=>{
            if (age>=18){
                console.log("valid age");
            }
        }
        msg2(23);

        //call back function
        //
        function cal(a,b,callback){
            var num1=a;
            console.log("First number is " + num1);
            var num2=b;
            console.log("Second number is " + num2);
            var res=num1+num2;
            callback(res);
        }
        function display(res){//display is call back function
            console.log("Result is " + res);
        }
        cal(4,5,display);

        //callback using setTimeout API

        function greeting()
        {
            document.writeln("Hello Student");
        }
        function loading(){
            document.writeln("Data loading.......");
        }
        loading();
        setTimeout(greeting, 2000);

        //callbackhell->Callback hell, or the "pyramid of doom," is a JavaScript programming issue caused by excessively nesting multiple asynchronous callbacks, making code unreadable, hard to maintain, and difficult to debug

        //JS Promises->JavaScript Promises are objects that represent the eventual completion (or failure) of an asynchronous operation and its resulting value.

        //we use promises iske 3 stages hote hain pending, reject, fullfilled

        //pending->operation started(not finished)
        //rejected->operation failed
        //fullfilled-> operation completed

        let promise=new Promise(function(resolve, reject){//variable name kuch bhi ho skta hai function(){}
            let age1=23;
            if(age1>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
        });
        promise.then(result=>console.log(result)).catch(error=>console.log(error));
        
        //async and await->Async/await is a modern JavaScript syntax that simplifies working with promises, allowing asynchronous code to be written in a synchronous, easy-to-read manner.

        //fetch api

        async function userData(){
            let userResponse=await fetch('https://jsonplaceholder.typicode.com/todos/1');//api me data key value pair me hota hai
            let userDataRes=await userResponse.json();
            console.log(userDataRes);

        }
        userData();
        //async await using dry catch

        async function productDetail(){
            try{
            let proRes=await fetch('https://jsonplaceholder.typicode.com/todos/1');
            let proResData=await proRes.json();
            console.log(proResData);
        }
        catch(error){
            console.log("not valid data " + error);
        }
    }
    productDetail();

    </script>
</body>
