<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Java Script Introduction</title>
</head>
<body>
    <h2>Java Script</h2>
    <script>
// JS variables
// using var keyword
var myName="ABES";//name declaration , ABES = name assignment
// document in javascript 
document.write(myName); // output on browser 
console.log(myName); // output on console
//JS execution and scope in JS (global and local scope)
function hello(){
    var msg="Thanks to visit!";
    console.log(msg);// local or block
}
hello();
// variable declaration using let and const
let myRollno =2025032;
console.log(myRollno);
 myRollno=2025033;// not redeclare but can reassign
console.log(myRollno);

const myPhoneno=987654321;
console.log("My contact no is: " + myPhoneno);
// myPhoneno=987654321; // not reassign
console.log(myPhoneno);
    </script>
</body>
</html>
